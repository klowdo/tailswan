name: Build Docker Image

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up QEMU
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read build versions
        id: versions
        run: |
          GO_VERSION=$(grep '^go ' go.mod | awk '{print $2}')
          echo "go-version=${GO_VERSION}" >> $GITHUB_OUTPUT
          echo "Using Go version: ${GO_VERSION}"

          ALPINE_VERSION=$(grep '^ARG ALPINE_VERSION=' Dockerfile | cut -d'=' -f2)
          TAILSCALE_VERSION=$(grep '^ARG TAILSCALE_VERSION=' Dockerfile | cut -d'=' -f2)
          echo "alpine-version=${ALPINE_VERSION}" >> $GITHUB_OUTPUT
          echo "tailscale-version=${TAILSCALE_VERSION}" >> $GITHUB_OUTPUT
          echo "Using Alpine version: ${ALPINE_VERSION}"
          echo "Using Tailscale version: ${TAILSCALE_VERSION}"

      - name: Extract metadata
        if: startsWith(github.ref, 'refs/tags/v')
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=TailSwan
            org.opencontainers.image.description=Bridge strongSwan/swanctl IPsec VPN and Tailscale networks
            org.opencontainers.image.vendor=TailSwan

      - name: Build (verify only)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          provenance: false
          build-args: |
            GO_VERSION=${{ steps.versions.outputs.go-version }}
            ALPINE_VERSION=${{ steps.versions.outputs.alpine-version }}
            TAILSCALE_VERSION=${{ steps.versions.outputs.tailscale-version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GO_VERSION=${{ steps.versions.outputs.go-version }}
            ALPINE_VERSION=${{ steps.versions.outputs.alpine-version }}
            TAILSCALE_VERSION=${{ steps.versions.outputs.tailscale-version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Summary
        run: |
          echo "## Docker Image Built Successfully! 🐳" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "### 📦 Published to:" >> $GITHUB_STEP_SUMMARY
            echo "- **GitHub Container Registry**: \`ghcr.io/${{ github.repository }}:${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Pull the image:" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
            echo "docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "### Build verified successfully" >> $GITHUB_STEP_SUMMARY
            echo "Image built but not pushed (only version tags publish to registry)." >> $GITHUB_STEP_SUMMARY
          fi
